---
- name: Check and shutdown ansible_node1 if reachable
  hosts: ansible_node1
  gather_facts: false
  become: yes

  tasks:
    - name: Test server connectivity with ping
      ansible.builtin.ping:
      register: ping_result
      ignore_errors: true

    - name: Fail if server is unreachable
      ansible.builtin.fail:
        msg: "Server {{ inventory_hostname }} is unreachable!"
      when: ping_result is failed or ping_result.ping is not defined or ping_result.ping != 'pong'

    - name: Confirm that server is reachable
      ansible.builtin.debug:
        msg: "Server {{ inventory_hostname }} is reachable and responding to ping."

    - name: Shutdown the server
      ansible.builtin.command: shutdown -h now
      async: 45
      poll: 0
      ignore_errors: yes

    - name: Wait for the server to shut down
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        state: stopped
        timeout: 300
      delegate_to: localhost

- name: Rename the VM from the Windows host using vmrun
  hosts: localhost
  gather_facts: false
  vars:
    vmware_vm_path: "E:\\ansible_node1\\ansible_node1.vmx"
    new_vm_path: "E:\\ansible_node1\\servername_testing.vmx"
    windows_host: "192.168.223.1"
    windows_user: "administrator"

  tasks:
    - name: Rename the VM using vmrun
      ansible.builtin.command: >
        "C:\\Program Files (x86)\\VMware\\VMware Workstation\\vmrun.exe" -T ws rename "{{ vmware_vm_path }}" "{{ new_vm_path }}"
      delegate_to: "{{ windows_host }}"
      vars:
        ansible_user: "{{ windows_user }}"
        ansible_password: "{{ win_password }}"
        ansible_connection: ssh
        ansible_shell_type: cmd
        ansible_port: 22
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

