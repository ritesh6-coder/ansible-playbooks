---
- name: Check and shutdown ansible_node1 if reachable
  hosts: ansible_node1
  become: yes
  gather_facts: no

  tasks:
    - name: Ping the ansible_node1
      ansible.builtin.ping:
      register: ping_result
      failed_when: ping_result.ping != "pong"

    - name: Display ping result
      ansible.builtin.debug:
        msg: "ansible_node1 is reachable and will be shut down"

    - name: Shutdown ansible_node1
      ansible.builtin.command: shutdown -h now
      async: 45
      poll: 0
      ignore_errors: true
      when: ping_result.ping == "pong"

    - name: Wait until ansible_node1 is down
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        state: stopped
        timeout: 300
      delegate_to: localhost
      when: ping_result.ping == "pong"

- name: Rename VM on Windows host via vmrun
  hosts: windows_host
  gather_facts: no

  vars:
    vmx_path: "E:\\ansible_node1\\ansible node 1.vmx"
    renamed_vmx_path: "E:\\ansible_node1\\ansible_node1_testing.vmx"
    vmrun_path: '"C:\\Program Files (x86)\\VMware\\VMware Workstation\\vmrun.exe"'

  tasks:
    - name: Rename VM using vmrun
      ansible.builtin.shell: >
        {{ vmrun_path }} -T ws rename "{{ vmx_path }}" "{{ renamed_vmx_path }}"
      args:
        executable: cmd

