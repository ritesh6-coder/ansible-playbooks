---
- name: Fetch and filter VM information from ESXi
  hosts: localhost
  gather_facts: no
  vars:
    esxi_hostname: "192.168.223.131"
    vmname: "{{ vm_input | default('linux-test') }}"
  tasks:
    - name: Get VM information from ESXi
      community.vmware.vmware_vm_info:
        hostname: "{{ esxi_hostname }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: no
      register: all_vms

    - name: Find matching VM
      set_fact:
        target_vm: "{{ all_vms.virtual_machines | selectattr('guest_name', 'equalto', vmname) | list | first }}"

    - name: Debug - Print number of VMs found
      debug:
        msg: "Total VMs retrieved: {{ all_vms.virtual_machines | length }}"

    - name: Debug - Print target VM info
      debug:
        var: target_vm
