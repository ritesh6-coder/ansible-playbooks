---
- name: Verify connection to ESXi vSphere
  hosts: localhost
  gather_facts: no
  environment:
    ANSIBLE_COLLECTIONS_PATHS: "/var/lib/awx/.ansible/collections"
  vars:
    esxi_hostname: "192.168.223.131"
    esxi_username: "{{ esxi_username | default('root') }}"
    esxi_password: "{{ esxi_password | default('PotterHead@123') }}"
    vm_name: "{{ vm_input | default('linux-test') }}"
  tasks:
    - name: Debug vm_name variable
      debug:
        var: vm_name

    - name: Check connectivity with ESXi server
      ansible.builtin.command: >
        ansible localhost -m community.vmware.vmware_vm_info -a "hostname={{ esxi_hostname }} username={{ esxi_username }} password={{ esxi_password }} port=443 validate_certs=false vm_name={{ vm_name }}" -e "ANSIBLE_COLLECTIONS_PATHS=/var/lib/awx/.ansible/collections"
      register: vm_info

    - name: Debug VM info
      debug:
        var: vm_info
